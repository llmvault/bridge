name: e2e-codedb

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-e2e-codedb:
    name: test-e2e-codedb
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
      - name: install codedb
        shell: bash
        run: |
          export CODEDB_DIR="$HOME/bin"
          mkdir -p "$CODEDB_DIR"
          VERSION=$(curl -fsSL https://codedb.codegraff.com/latest.json | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          for attempt in 1 2 3; do
            if curl -fsSL "https://codedb.codegraff.com/v${VERSION}/codedb-linux-x86_64" -o "$CODEDB_DIR/codedb"; then
              break
            fi
            echo "Download attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          chmod +x "$CODEDB_DIR/codedb"
          echo "$CODEDB_DIR" >> "$GITHUB_PATH"
          "$CODEDB_DIR/codedb" --version
        env:
          CODEDB_NO_TELEMETRY: "1"
      - name: run codedb e2e tests
        run: cargo test -p bridge-e2e --test codedb_e2e_tests -- --ignored --test-threads=1
